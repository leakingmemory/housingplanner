name: Check Versions

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract versions
        id: extract_versions
        run: |
          CARGO_VERSION=$(grep '^version =' Cargo.toml | cut -d '"' -f 2)
          SNAP_VERSION=$(grep '^version:' snap/snapcraft.yaml | cut -d "'" -f 2)

          echo "Cargo version: $CARGO_VERSION"
          echo "Snap version: $SNAP_VERSION"

          if [ -z "$CARGO_VERSION" ]; then echo "::error::Could not extract version from Cargo.toml"; exit 1; fi
          if [ -z "$SNAP_VERSION" ]; then echo "::error::Could not extract version from snap/snapcraft.yaml"; exit 1; fi

          echo "cargo_version=$CARGO_VERSION" >> $GITHUB_OUTPUT
          echo "snap_version=$SNAP_VERSION" >> $GITHUB_OUTPUT

      - name: Compare versions
        run: |
          CARGO="${{ steps.extract_versions.outputs.cargo_version }}"
          SNAP="${{ steps.extract_versions.outputs.snap_version }}"

          if [ "$CARGO" != "$SNAP" ]; then
            echo "::error::Cargo version ($CARGO) does not match Snap version ($SNAP)"
            exit 1
          fi
          echo "All versions match: $CARGO"
