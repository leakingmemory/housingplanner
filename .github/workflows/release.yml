name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install \
            libxkbcommon-dev libwayland-dev libx11-dev libxcursor-dev \
            libxi-dev libxrandr-dev libgl1-mesa-dev libfontconfig1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p housingplanner-${VERSION}
          cp target/release/housingplanner housingplanner-${VERSION}/
          cp license.txt README.md housingplanner-${VERSION}/ 2>/dev/null || true
          tar -czf housingplanner-${VERSION}-linux-x86_64.tar.gz housingplanner-${VERSION}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: housingplanner-*-linux-x86_64.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-tarball

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
